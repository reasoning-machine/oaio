plugins:
  - jekyll-relative-links
relative_links:
  enabled: true
  collections: true
include:
  - README.md
  - LICENSE.md
url: https://reasoning-machine.github.io
baseurl: /oaio

title: Reasoning Machine
description: A machine is a thing. Things can not think. ...but some of them can thingk!

machine:
  name: Reasoning-Machine
  verb: Reasoning
  instructions_file: oaio_reasoning.txt
  token: openai.txt
  apiUrl: https://api.openai.com/v1/responses
  fallback_llm: o4-mini

app:
  worker_name: oaioapi.js

lm:
  model: o3-2025-04-16
  max_output_tokens: 100000
  reasoning_effort: high
  reasoning_summary: detailed
  temperature: 1.0

github_settings:
  owner: reasoning-machine
  repo: reasoning_machine
  file_name: machina.yaml
  branch: main
  token_file: github.txt
